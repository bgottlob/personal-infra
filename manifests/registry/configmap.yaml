---
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-config
  namespace: registry
  labels:
    app: registry
data:
  config.yml: |-
    version: 0.1
    log:
      fields:
        service: registry
      level: debug
    auth:
      htpasswd:
        realm: basic-realm
        path: /auth/htpasswd
    storage:
      cache:
        blobdescriptor: inmemory
      s3:
        region: us-east-1
        regionendpoint: us-east-1.linodeobjects.com/
        secure: true
        bucket: bgottlob-registry
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
      debug:
        addr: 127.0.0.1:5001
        prometheus:
          enabled: false
          path: /metrics
    health:
      storagedriver:
        enabled: true
    interval: 10s
    threshold: 3
