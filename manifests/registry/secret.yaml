apiVersion: v1
kind: Secret
metadata:
  name: registry-creds
  namespace: default
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |-
    {
      "auths": {
        "registry.bgottlob.com": {
          "username": "${REGISTRY_USERNAME}",
          "password": "${REGISTRY_PASSWORD}",
          "email": "${REGISTRY_EMAIL}",
          "auth": "${REGISTRY_AUTH}"
        }
      }
    }
