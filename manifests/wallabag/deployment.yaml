apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      containers:
      - name: wallabag
        image: wallabag/wallabag:2.5.4
        ports:
        - containerPort: 80
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallabag-postgres
              key: userPassword
        - name: SYMFONY__ENV__DATABASE_DRIVER
          value: pdo_pgsql
        - name: SYMFONY__ENV__DATABASE_HOST
          value: mypostgres.postgres
        - name: SYMFONY__ENV__DATABASE_PORT
          value: "5432"
        - name: SYMFONY__ENV__DATABASE_NAME
          value: wallabag
        - name: SYMFONY__ENV__DATABASE_USER
          value: postgres
        - name: SYMFONY__ENV__DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallabag-postgres
              key: userPassword
        - name: SYMFONY__ENV__DOMAIN_NAME
          value: "https://wallabag.bgottlob.com"
        - name: SYMFONY__ENV__SERVER_NAME
          value: "Brandon's Wallabag"
        - name: SYMFONY__ENV__FOSUSER_REGISTRATION
          value:  "false"
